spring:
    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: none
                        client-secret: none
                        scope: none
                provider:
                    google:
                        user-info-uri: none
                        authorization-uri: none
    session:
        store-type: redis
        timeout: 336h  # 2 тижні
    data:
        redis:
            host: redis
            port: 6379

    datasource:
        url: jdbc:h2:mem:testdb
    jpa:
        hibernate.ddl-auto: create-drop
        show-sql: true
    config:
        import:
            - optional:configserver:${config.server.url}
    cloud:
        vault:
            enabled: false

server:
    forward-headers-strategy: framework
    error:
        whitelabel:
            enabled: false
    port: 8050
    servlet:
        session:
            cookie:
                name: JSESSION_${spring.application.name}
                same-site: lax
                secure: true
                path: /
                max-age: 1209600   # 14 днів у секундах
        context-path: /${spring.application.name}

#debug: true
logging:
    level:
        org.sav: TRACE
        org.springframework.security: TRACE
        org.springframework.web: TRACE
        org.springframework.http: TRACE
        reactor.netty: TRACE
        io.netty: TRACE

    pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss}[%-5level][%thread][%logger] - %msg%n"
