<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Сесії користувачів</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h2>Активні сесії</h2>
    <table>
        <thead>
        <tr>
            <th>#</th>
            <th>User</th>
            <th>Створено</th>
            <th>Останній доступ</th>
            <th>ttl</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="sess, sessStat : ${sessions}" th:object="${sess}">
            <td th:text="${sessStat.count}"></td>
            <td>
                <a th:href="@{/api/session/view(sid=*{id})}"
                   th:text="*{username}">
                </a>
            </td>
            <td th:text="*{{creationTime}}"></td>
            <td th:text="*{{lastAccessedTime}}"></td>
            <td>
                <a th:href="@{/session/delete(sid=*{id})}"  th:text="*{ttlFormatted}" style="margin-left: 10px; color: red;"></a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
