<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Профіль</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container">
    <h2>Профіль користувача</h2>
    <form th:action="@{/profile}" th:object="${user}" method="post">
        <input type="hidden" th:field="*{id}"/>
        <input type="hidden" th:field="*{username}"/>
        <div>
            <label>Username:</label>
            <span th:text="*{username}"></span>
        </div>
        <div>
            <label>Email:</label>
            <span th:text="*{email}"></span>
        </div>
        <div>
            <label for="name">Ім'я:</label>
            <input type="text" id="name" name="name" th:value="*{name}">
        </div>
        <div>
            <label for="surname">Прізвище:</label>
            <input type="text" id="surname" name="surname" th:value="*{surname}">
        </div>
        <div id="error-message" style="color: red; margin-bottom: 10px; display: none;"></div>
        <div>
            <label for="password">Новий пароль:</label>
            <input type="password" id="password" name="password">
        </div>
        <div>
            <label for="password2">Підтвердження пароля:</label>
            <input type="password" id="password2" name="password2">
        </div>
        <button type="submit" onclick="return validatePassword()">Зберігти</button>
    </form>
    
    <script>
    function showError(message) {
        const errorDiv = document.getElementById('error-message');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 5000);
    }
    
    function validatePassword() {
        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;
        
        if (password && password.length > 0) {
            if (password !== password2) {
                showError('Паролі не співпадають');
                return false;
            }
            
            if (password.length < 8) {
                showError('Пароль повинен містити мінімум 8 символів');
                return false;
            }
            
            if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
                showError('Пароль повинен містити великі та малі літери, цифри');
                return false;
            }
        }
        return true;
    }
    </script>
</div>
</body>
</html>
